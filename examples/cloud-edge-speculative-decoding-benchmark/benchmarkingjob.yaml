benchmarkingjob:
  name: "benchmarkingjob"
  workspace: "./workspace-cloud-edge-speculative-decoding-benchmark-gsm8k"

  hard_example_mining_mode: "mining-free"

  testenv: "./examples/cloud-edge-speculative-decoding-benchmark/testenv/testenv.yaml"

  test_object:
    type: "algorithms"
    algorithms:
      - name: "speculative-decoding"
        url: "./examples/cloud-edge-speculative-decoding-benchmark/testalgorithms/speculative-decoding/test_speculative_decoding.yaml"

  rank:
    sort_by:
      - { "Time to First Token": "ascend" }
      - { "Throughput": "descend" }

    visualization:
      mode: "selected_only"
      method: "print_table"

    selected_dataitem:
      paradigms: [ "all" ]
      modules: [ "all" ]
      hyperparameters:
        [
          "dataset_processor-sample_size",
          "drafter-inference_mode",
          "drafter-generation_backend",
          "drafter-model",
          "verifier-generation_backend",
          "verifier-model",
          "drafter-draft_tokens_per_step"
        ]
      metrics:
        [
          "Time to First Token",
          "Throughput",
          "Internal Token Latency",
          "End-to-End Latency",
          "Acceptance Rate"
        ]

    save_mode: "selected_and_all"
